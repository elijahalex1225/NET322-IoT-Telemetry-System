syntax = "proto3";

package telemetry;

// SENSOR MESSAGE
message Sensor{
  string sensor_id = 1;
  string sensor_type = 2;
  string location = 3;
  int32 reporting_interval = 4;
} 
// SENSOR READING MESSAGE
message Reading {
  string sensor_id = 1;
  string reading_type = 2;  
  double value = 3;
  string unit = 4;          
  int64 timestamp = 5;     
}
